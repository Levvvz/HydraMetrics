name: C++ CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential clang-format ninja-build tar unzip curl git zip

    - name: Check Code Formatting (Clang-Format)
      run: |
        git ls-files | grep -E '\.(cpp|hpp)$' | xargs --no-run-if-empty clang-format --dry-run --Werror

    # Официальный экшен от Microsoft: сам ставит vcpkg, кеширует и запускает сборку
    - name: Run CMake and Build with vcpkg Manifest
      uses: lukka/run-cmake@v10
      with:
        configurePreset: 'release' # Экшен сам создаст дефолтный пресет, если его нет
        buildPreset: 'release'
        # Если пресетов нет, мы можем запустить классическую конфигурацию через аргументы:
        configurePresetAdditionalArgs: '-DCMAKE_BUILD_TYPE=Release -G Ninja'