version: '3.8'

services:
  hydrametrics-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydrametrics_app
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=hydrametrics-cache
      - REDIS_PORT=6337
      - SERVER_PORT=8080
    depends_on:
      - hydrametrics-cache
    networks:
      - hydra_network
    restart: unless-stopped

  hydrametrics-cache:
    image: redis:7.2-alpine
    container_name: hydrametrics_redis
    command: redis-server --port 6337 --save "" --appendonly no
    ports:
      - "6337:6337"
    networks:
      - hydra_network
    restart: unless-stopped

networks:
  hydra_network:
    driver: bridge
