services:
  hydrametrics-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydrametrics_app
    depends_on:
      - hydrametrics-cache
    environment:
      REDIS_HOST: hydrametrics-cache
      REDIS_PORT: "6337"
      SERVER_ADDRESS: "0.0.0.0"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - hydra_network
    restart: unless-stopped

  hydrametrics-cache:
    image: redis:7-alpine
    container_name: hydrametrics_redis
    command:
      - redis-server
      - --port
      - "6337"
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6337:6337"
    networks:
      - hydra_network
    restart: unless-stopped

networks:
  hydra_network:
    driver: bridge
